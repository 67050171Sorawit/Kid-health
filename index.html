<style>

    --bg-deep:#f5f5f5; --bg-deep-2:#e9eec2;

  .page{
    flex:1 1 auto; min-height:0; width:100%; max-width:none; margin:0;
    display:flex; align-items:stretch; justify-content:center; gap:0;
    padding:0 0 0; flex-wrap:nowrap;

  .intro{ display:none; }
  .card-wrap{ flex:1 1 auto; width:100%; max-width:none; height:100%; min-height:0; }

  .screen{

<script>
// ============ UTIL ============
function escapeHtml(str){
  return String(str == null ? '' : str).replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

const mealNames = ['มื้อเช้า','มื้อกลางวัน','มื้อเย็น'];
const foodTagOptions = ['ข้าวผัด','ผัดผัก','ไข่เจียว','ผลไม้','น้ำหวาน'];
const exerciseTagOptions = ['วิ่ง','ปั่นจักรยาน','ว่ายน้ำ','เต้น','กระโดดเชือก','เล่นกีฬา'];
const totalSteps = mealNames.length + 1; // 3 meals + 1 exercise step

function freshMeals(){
  return mealNames.map(()=>({ eaten:null, food:'', tags:[] }));
}
function freshExercise(){
  return { done:null, type:'', duration:'' };
}

// ============ BMI ============
function calcBMI(weightKg, heightCm){
  const h = parseFloat(heightCm) / 100;
  const w = parseFloat(weightKg);
  if(!h || h<=0 || !w || w<=0) return null;
  return w / (h*h);
}

// Category cutoffs & styling as specified:
//   สีเขียวอ่อน  น้อยกว่าเกณฑ์   < 18.5
//   สีขาว        ปกติ            18.5 - 24.9
//   สีเขียวเข้ม  มากกว่าเกณฑ์    25 - 29.9
//   สีเหลือง     อ้วนระดับ 1     30 - 34.9
//   สีส้ม        อ้วนระดับ 2     >= 35
const bmiCategories = [
  { key:'under',  label:'น้อยกว่าเกณฑ์', range:'น้อยกว่า 18.5', color:'#BFEAC5', textColor:'#1B5E20',
    advice:'หนูมีน้ำหนักน้อยกว่าเกณฑ์นะ ลองทานอาหารให้ครบ 5 หมู่ เน้นข้าว เนื้อสัตว์ ไข่ นม และผลไม้ให้เพียงพอ พร้อมพักผ่อนให้เต็มที่ ถ้าไม่แน่ใจลองปรึกษาคุณหมอหรือผู้ปกครองเพิ่มเติมได้นะ' },
  { key:'normal', label:'ปกติ', range:'18.5 - 24.9', color:'#FFFFFF', textColor:'#14302F',
    advice:'เยี่ยมมาก! น้ำหนักและส่วนสูงของหนูอยู่ในเกณฑ์ปกติ รักษาสุขภาพแบบนี้ต่อไปนะ ทานอาหารมีประโยชน์และออกกำลังกายสม่ำเสมอ' },
  { key:'over',   label:'มากกว่าเกณฑ์', range:'25 - 29.9', color:'#3FA34D', textColor:'#FFFFFF',
    advice:'น้ำหนักของหนูมากกว่าเกณฑ์เล็กน้อยนะ ลองเพิ่มการออกกำลังกาย ลดของหวานและของทอด แล้วสุขภาพจะดีขึ้นได้' },
  { key:'obese1', label:'อ้วนระดับ 1', range:'30 - 34.9', color:'#FFC857', textColor:'#5C3D00',
    advice:'น้ำหนักของหนูอยู่ในระดับที่ควรดูแลเป็นพิเศษนะ ลองทานผักผลไม้ให้มากขึ้น ลดน้ำหวานและของทอด ออกกำลังกายสม่ำเสมอ และปรึกษาคุณหมอหรือผู้ปกครองเพื่อดูแลสุขภาพเพิ่มเติมได้นะ' },
  { key:'obese2', label:'อ้วนระดับ 2', range:'35 ขึ้นไป', color:'#FF9142', textColor:'#5C2600',
    advice:'น้ำหนักของหนูอยู่ในระดับที่ควรดูแลอย่างใกล้ชิดนะ แนะนำให้ปรึกษาคุณหมอหรือผู้ปกครองเพื่อช่วยกันวางแผนดูแลสุขภาพให้เหมาะสมนะ' },
];

function getBmiInfo(bmi){
  if(bmi==null) return null;
  if(bmi < 18.5) return bmiCategories[0];
  if(bmi < 25)   return bmiCategories[1];
  if(bmi < 30)   return bmiCategories[2];
  if(bmi < 35)   return bmiCategories[3];
  return bmiCategories[4];
}

// Weight range (kg) that would put this height in the "ปกติ" (normal) band
function idealWeightRange(heightCm){
  const h = parseFloat(heightCm) / 100;
  if(!h || h<=0) return null;
  return { min: (18.5*h*h).toFixed(1), max: (24.9*h*h).toFixed(1) };
}

// ============ FUN STUFF: confetti, bounce text, mascot, streaks ============
function burstConfetti(count){
  count = count || 40;
  const colors = ['#FF6B4A','#4ECDC4','#FFC857','#FF9142','#3FA34D'];
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = (Math.random()*100) + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2 + Math.random()*1.4) + 's';
    el.style.animationDelay = (Math.random()*0.3) + 's';
    document.body.appendChild(el);
    setTimeout(()=> el.remove(), 4200);
  }
}

// Wraps each character in its own <span> with a staggered animation-delay
// so the whole string appears to bounce like a wave.
function bounceText(str){
  return `<span class="bounce-text">${[...str].map((ch,i)=>
    `<span style="animation-delay:${(i*0.05).toFixed(2)}s">${ch===' '?'&nbsp;':escapeHtml(ch)}</span>`
  ).join('')}</span>`;
}

// ---- Streak (consecutive check-in days), Duolingo-style ----
function yesterdayStr(){
  const d = new Date();
  d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
function updateStreak(){
  if(!data.streak) data.streak = { count:0, lastDate:null };
  const today = todayStr();
  if(data.streak.lastDate === today){
    // already checked in today, no change
  }else if(data.streak.lastDate === yesterdayStr()){
    data.streak.count = (data.streak.count||0) + 1;
    data.streak.lastDate = today;
  }else{
    data.streak.count = 1;
    data.streak.lastDate = today;
  }
}
// Streak only "counts" for display if the last check-in was today or
// yesterday — otherwise it's effectively broken even if we haven't
// overwritten the stored count yet (that only happens on the next check-in).
function getDisplayStreak(){
  if(!data.streak || !data.streak.lastDate) return 0;
  const today = todayStr();
  if(data.streak.lastDate === today || data.streak.lastDate === yesterdayStr()) return data.streak.count || 0;
  return 0;
}
// A single global "last check-in date" (same field the streak uses) means
// once ANY week's check-in is completed today, no more check-ins — of any
// week — can happen until tomorrow. This is what enforces "one day at a
// time, no skipping ahead to fill in future days."
function hasCheckedInToday(){
  return !!(data.streak && data.streak.lastDate === todayStr());
}

function normalizeFoodStr(s){
  return (s||'').toLowerCase().replace(/\s+/g,'').trim();
}
function isKnownFoodSegment(segment){
  const norm = normalizeFoodStr(segment);
  if(norm.length < 2) return false;
  return knownFoodMenu.some(f=>{
    const fn = normalizeFoodStr(f);
    return norm===fn || norm.includes(fn) || fn.includes(norm);
  });
}
// Accepts combos like "ข้าวผัด + ไข่ดาว" or "ข้าวผัด 2 จาน" — strips
// quantity/measure words, splits on common separators, and requires every
// remaining piece to match something in knownFoodMenu.
function isValidFoodText(str){
  let s = (str||'').trim();
  if(!s) return false;
  s = s.replace(/\d+\s*(จาน|ชาม|ถ้วย|ชิ้น|ฟอง|แก้ว|ก้อน|ห่อ|ที่|คำ|ลูก|ผล|ไม้|ใบ|กล่อง|ขวด)/g, '');
  const segments = s.split(/[\+,\/]|กับ|และ/).map(x=>x.trim()).filter(Boolean);
  if(!segments.length) return false;
  return segments.every(isKnownFoodSegment);
}

auth.onAuthStateChanged(async (user) => {
  if(user){
    currentUid = user.uid;

    await loadUserData();
    screenState = data.onboarded ? 'weeks' : 'lang';

    currentUid = null;
    currentUsername = '';

    screenState = 'login';

async function loadUserData(){
  try{
    const doc = await db.collection('users').doc(currentUid).get();
    if(doc.exists){
      data = doc.data().data;
    }else{
      data = JSON.parse(JSON.stringify(defaultState));
      data.playerId = currentUid;
      await db.collection('users').doc(currentUid).set({ username: currentUsername, data });
    }
  }catch(e){
    console.error('load user data failed', e);
    data = JSON.parse(JSON.stringify(defaultState));
  }
  if(Array.isArray(data.weeks)){
    data.weeks.forEach(w=>{ if(!Array.isArray(w.logs)) w.logs = []; });
  }
  if(!data.playerId) data.playerId = currentUid;
  if(data.dailyFood === undefined) data.dailyFood = null;
  if(!data.streak) data.streak = { count:0, lastDate:null };
}

async function saveData(){
  if(!currentUid) return; // nothing to save until someone is logged in
  try{
    await db.collection('users').doc(currentUid).set({ username: currentUsername, data }, { merge:true });
  }catch(e){
    console.error('save failed', e);
  }
  syncPlayerRecord();
}

// Returns null on success, or a Thai error message string on failure.
async function doSignup(usernameRaw, password, confirmPassword){
  const username = (usernameRaw || '').trim();
  if(!username || !password) return 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน';
  if(username.length < 3) return 'ชื่อผู้ใช้ต้องมีอย่างน้อย 3 ตัวอักษร';
  if(!/^[a-zA-Z0-9_.]+$/.test(username)) return 'ชื่อผู้ใช้ใช้ได้แค่ตัวอักษรอังกฤษ ตัวเลข และ _ . เท่านั้น';
  if(password.length < 6) return 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';
  if(password !== confirmPassword) return 'รหัสผ่านทั้งสองช่องไม่ตรงกัน';

  try{
    await auth.createUserWithEmailAndPassword(usernameToEmail(username), password);
    // onAuthStateChanged will fire automatically and load/create the data doc
    return null;
  }catch(e){
    if(e.code === 'auth/email-already-in-use') return 'ชื่อผู้ใช้นี้มีคนใช้แล้ว ลองชื่ออื่นนะ';
    if(e.code === 'auth/weak-password') return 'รหัสผ่านนี้ไม่ปลอดภัยพอ ลองตั้งยาวขึ้นอีกนิด';
    console.error(e);
    return 'สมัครสมาชิกไม่สำเร็จ ลองใหม่อีกครั้งนะ';
  }
}

async function doLogin(usernameRaw, password){
  const username = (usernameRaw || '').trim();
  if(!username || !password) return 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน';
  try{
    await auth.signInWithEmailAndPassword(usernameToEmail(username), password);
    return null; // onAuthStateChanged handles loading data + screen switch
  }catch(e){
    if(e.code === 'auth/invalid-credential' || e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password'){
      return 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
    }
    console.error(e);
    return 'เข้าสู่ระบบไม่สำเร็จ ลองใหม่อีกครั้งนะ';
  }
}

async function doLogout(){
  try{
    await auth.signOut();
    // onAuthStateChanged fires and resets screenState to 'login'
  }catch(e){
    console.error(e);
  }
}

// Push a privacy-light summary of this player's progress to a public
// Firestore collection so the admin dashboard (password-gated in the UI)
// can see everyone who has played. Weight/height stay private — only in
// each user's own "users/{uid}" document.
async function syncPlayerRecord(){
  if(!currentUid) return;
  const record = {
    id: currentUid,
    username: currentUsername,
    name: data.profile.name || '',
    weight: data.profile.weight || '',
    height: data.profile.height || '',
    quizScore: data.quiz.submitted ? data.quiz.score : null,
    weeks: data.weeks.map(w=>w.done),
    weeksDetail: data.weeks.map(w=> (w.logs||[])), // full day-by-day logs, per week
    dailyChallenge: data.dailyChallenge || null,
    dailyFood: data.dailyFood || null,
    totalDays: data.weeks.reduce((sum,w)=>sum+w.done,0),
    updatedAt: new Date().toISOString(),
  };
  try{
    await db.collection('public_summary').doc(currentUid).set(record);
  }catch(e){
    console.error('player sync failed', e);
  }
  pushToGoogleSheets(record); // fire-and-forget real-time sync, no-op if not configured
}

// Sends this player's latest record to the Google Sheets Web App so the
// sheet reflects it immediately. Uses mode:'no-cors' + text/plain so the
// browser sends it as a "simple request" (Apps Script can't answer CORS
// preflight requests), which means we can't read a response — that's fine,
// this is intentionally fire-and-forget so it never blocks the UI.
function pushToGoogleSheets(record){
  if(!GOOGLE_SHEETS_WEBAPP_URL) return;
  try{
    fetch(GOOGLE_SHEETS_WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(record),
    }).catch(e=> console.error('google sheets sync failed', e));
  }catch(e){
    console.error('google sheets sync failed', e);
  }
}

// One-time backfill: pushes EVERY already-loaded player (ctx.adminPlayers,
// from public_summary) to Google Sheets. Needed because the automatic sync
// only fires going forward from the moment it was configured — data saved
// before that was never sent to the sheet. Staggered 400ms apart so we
// don't fire 20+ simultaneous requests at Apps Script's execution quota.
function syncAllToGoogleSheets(){
  const statusEl = document.getElementById('adminExportStatus');
  const btn = document.getElementById('adminSyncAll');
  if(!GOOGLE_SHEETS_WEBAPP_URL){
    if(statusEl) statusEl.textContent = 'ยังไม่ได้ตั้งค่า Google Sheets (ดู google-sheets-setup.md)';
    return;
  }
  const players = ctx.adminPlayers || [];
  if(!players.length){
    if(statusEl) statusEl.textContent = 'ยังไม่มีข้อมูลผู้เล่นให้ซิงค์';
    return;
  }
  if(btn) btn.disabled = true;
  let sent = 0;
  players.forEach((p, i)=>{
    setTimeout(()=>{
      pushToGoogleSheets(p);
      sent++;
      if(statusEl) statusEl.textContent = `กำลังซิงค์... (${sent}/${players.length})`;
      if(sent === players.length){
        if(statusEl) statusEl.textContent = `ซิงค์ข้อมูลเดิมทั้งหมดไปที่ Sheets แล้ว (${players.length} คน) — เช็คในชีตได้เลย`;
        if(btn) btn.disabled = false;
      }
    }, i * 400);
  });
}

async function loadAdminData(){
  screenState = 'loading';
  render();
  let players = [];
  try{
    const snap = await db.collection('public_summary').get();
    snap.forEach(doc => players.push(doc.data()));
  }catch(e){
    console.error('load admin data failed', e);
  }
  players.sort((a,b)=> (b.totalDays||0) - (a.totalDays||0));
  ctx.adminPlayers = players;
  screenState = 'adminDashboard';
  render();
}

// Builds a two-sheet Excel file from the already-loaded public_summary
// data (ctx.adminPlayers): one row per player (summary) and one row per
// logged day (detail). Uses public_summary rather than the 'users'
// collection because 'users' is typically locked down per-owner while
// public_summary is the collection the admin view is allowed to read.
function exportAdminExcel(){
  const statusEl = document.getElementById('adminExportStatus');
  const btn = document.getElementById('adminExport');
  if(btn) btn.disabled = true;
  if(statusEl) statusEl.textContent = 'กำลังสร้างไฟล์ Excel...';

  try{
    const players = ctx.adminPlayers || [];
    if(!players.length){
      if(statusEl) statusEl.textContent = 'ยังไม่มีข้อมูลผู้เล่นให้ส่งออก';
      if(btn) btn.disabled = false;
      return;
    }
    const today = todayStr();
    const summaryRows = [];
    const detailRows = [];

    players.forEach(p=>{
      const weeks = Array.isArray(p.weeks) ? p.weeks : [];
      const weeksDetail = Array.isArray(p.weeksDetail) ? p.weeksDetail : [];

      summaryRows.push({
        'ชื่อ-นามสกุล': p.name || '(ไม่ระบุชื่อ)',
        'น้ำหนัก (กก.)': p.weight || '',
        'ส่วนสูง (ซม.)': p.height || '',
        'คะแนนควิซ': p.quizScore!=null ? `${p.quizScore}/3` : 'ยังไม่ทำ',
        'Week 1 (วัน)': weeks[0] || 0,
        'Week 2 (วัน)': weeks[1] || 0,
        'Week 3 (วัน)': weeks[2] || 0,
        'Week 4 (วัน)': weeks[3] || 0,
        'รวมวันทั้งหมด': p.totalDays || 0,
        'ภารกิจออกกำลังกายวันนี้': (p.dailyChallenge && p.dailyChallenge.date===today) ? p.dailyChallenge.text : '',
        'เมนูอาหารแนะนำวันนี้': (p.dailyFood && p.dailyFood.date===today) ? p.dailyFood.text : '',
        'อัปเดตล่าสุด': p.updatedAt ? new Date(p.updatedAt).toLocaleString('th-TH') : '',
      });

      weeksDetail.forEach((logs, wi)=>{
        (logs||[]).forEach(log=>{
          const mealsArr = Array.isArray(log.meals)
            ? log.meals
            : mealNames.map(nm=>({ name:nm, eaten: log.eaten, food: log.food, tags: log.tags||[] }));
          const mealSummary = mealsArr.map(m=>{
            const detail = m.eaten
              ? (m.food || (m.tags && m.tags.length ? m.tags.join(', ') : 'ทานแล้ว'))
              : 'ไม่ได้ทาน';
            return `${m.name}: ${detail}`;
          }).join(' | ');
          const ex = log.exercise || {};
          const exSummary = ex.done
            ? `${ex.type || 'ออกกำลังกาย'}${ex.duration ? ' (' + ex.duration + ' นาที)' : ''}`
            : 'ไม่ได้ออกกำลังกาย';

          detailRows.push({
            'ชื่อ-นามสกุล': p.name || '(ไม่ระบุชื่อ)',
            'สัปดาห์': wi+1,
            'วันที่ (ลำดับในสัปดาห์)': log.day,
            'มื้ออาหาร': mealSummary,
            'ออกกำลังกาย': exSummary,
            'รางวัลที่ได้รับ': log.reward || '',
          });
        });
      });
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryRows), 'สรุปผู้เล่น');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailRows), 'รายละเอียดรายวัน');
    XLSX.writeFile(wb, `kid-health-export-${today}.xlsx`);

    if(statusEl) statusEl.textContent = `ดาวน์โหลดสำเร็จ! (${summaryRows.length} คน, ${detailRows.length} รายการ)`;
  }catch(e){
    console.error('export to excel failed', e);
    if(statusEl) statusEl.textContent = 'ดึงข้อมูลไม่สำเร็จ: ' + (e && e.message ? e.message : 'ข้อผิดพลาดไม่ทราบสาเหตุ');
  }
  if(btn) btn.disabled = false;
}

      return `<div class="day-cell ${done?'done':''} ${isToday?'today':''}">${done?'✓':dayNum}</div>`;
    }).join('');
    const finished = w.done>=7;
    const checkedInToday = hasCheckedInToday();

    const logsHtml = w.logs && w.logs.length ? `
      <div class="field-label" style="margin-top:14px;">บันทึกที่ผ่านมา (แตะเพื่อแก้ไข)</div>
      <div class="week-list" style="gap:6px;">
        ${w.logs.slice().reverse().map((l,revIdx)=>{
          const origIdx = w.logs.length - 1 - revIdx;
          let mealLines;
          if(Array.isArray(l.meals)){
            mealLines = l.meals.map(m=>{
              const detail = m.eaten
                ? (m.food ? escapeHtml(m.food) : (m.tags && m.tags.length ? escapeHtml(m.tags.join(', ')) : 'ทานแล้ว'))
                : 'ไม่ได้ทาน';
              return `${escapeHtml(m.name)}: ${detail}`;

            mealLines = l.eaten
              ? (l.food ? escapeHtml(l.food) : (l.tags && l.tags.length ? escapeHtml(l.tags.join(', ')) : 'ทานข้าวแล้ว'))
              : 'ยังไม่ได้ทานข้าว';

              ? `🏃 ${l.exercise.type ? escapeHtml(l.exercise.type) : 'ออกกำลังกาย'}${l.exercise.duration ? ' · ' + escapeHtml(l.exercise.duration) + ' นาที' : ''}`

          return `<div class="log-item" data-log-idx="${origIdx}"><div class="lday">วันที่ ${l.day}<span class="ledit">✏️ แก้ไข</span></div><div class="lmeal">${mealLines}</div>${exLine ? `<div class="lex">${exLine}</div>` : ''}${rewardLine}</div>`;
        }).join('')}

    }).join('');

    const icon = isReward ? '🎁' : (isFood ? '🍽️' : '🎯');
    const showBack = !isReward && !w.spun;
    const resultLabel = (w.resultIndex!=null) ? segs[w.resultIndex].label : '';
    const doneLabel = isReward ? 'กลับไปหน้า Week' : (isFood ? 'รับเมนูนี้' : 'เริ่มภารกิจนี้');
    return `
    <div class="topbar"><span class="screen-tag">${isReward?'รางวัล':(isFood?'เมนูวันนี้':'ภารกิจวันนี้')}</span>${showBack ? '<span class="back-link" id="wheelBack">‹ ย้อนกลับ</span>' : ''}</div>

      </div>
      ${w.resultIndex==null
        ? `<button class="big-btn" id="spinBtn" style="margin-top:20px;" ${w.spinning?'disabled':''}>${w.spinning?'กำลังหมุน...':'หมุนเลย!'}</button>`
        : `<div class="wheel-result">🎉 ได้รับ: ${escapeHtml(resultLabel)}</div>

// ============ INTERACTIONS ============
function bindInteractions(s){
  if(s==='login'){
    document.getElementById('toSignup').addEventListener('click', ()=>{ screenState='signup'; render(); });
    const submitLogin = async ()=>{
      const u = document.getElementById('loginUsername').value;
      const p = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginErr');
      errEl.textContent = 'กำลังตรวจสอบ...';
      const err = await doLogin(u, p);
      if(err){ errEl.textContent = err; return; }
      errEl.textContent = '';
      screenState = data.onboarded ? 'weeks' : 'lang';
      render();
    };
    document.getElementById('loginBtn').addEventListener('click', submitLogin);
    document.getElementById('loginPassword').addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitLogin(); });
  }

  if(s==='signup'){
    document.getElementById('toLogin').addEventListener('click', ()=>{ screenState='login'; render(); });
    const submitSignup = async ()=>{
      const u = document.getElementById('signupUsername').value;
      const p = document.getElementById('signupPassword').value;
      const c = document.getElementById('signupConfirm').value;
      const errEl = document.getElementById('signupErr');
      errEl.textContent = 'กำลังสร้างบัญชี...';
      const err = await doSignup(u, p, c);
      if(err){ errEl.textContent = err; return; }
      errEl.textContent = '';
      screenState = 'lang';
      render();
    };
    document.getElementById('signupBtn').addEventListener('click', submitSignup);
    document.getElementById('signupConfirm').addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitSignup(); });
  }

  if(s==='lang'){
    screenEl.querySelectorAll('.lang-btn').forEach(b=> b.addEventListener('click', ()=>{
      data.profile.lang = b.dataset.lang;
      render();
    }));
    document.getElementById('toName').addEventListener('click', ()=>{ screenState='name'; render(); });
  }

  if(s==='name'){
    document.getElementById('backBtn').addEventListener('click', ()=>{ screenState='lang'; render(); });
    document.getElementById('toBody').addEventListener('click', ()=>{
      const val = document.getElementById('nameInput').value.trim();
      if(!val){ document.getElementById('nameErr').textContent = 'กรุณากรอกชื่อก่อนนะ'; return; }
      data.profile.name = val;
      screenState='body'; render();
    });
  }

  if(s==='body'){
    document.getElementById('backBtn').addEventListener('click', ()=>{ screenState='name'; render(); });
    document.getElementById('toQuiz').addEventListener('click', ()=>{
      const wv = document.getElementById('weightInput').value;
      const hv = document.getElementById('heightInput').value;
      if(!wv || !hv || Number(wv)<=0 || Number(hv)<=0){
        document.getElementById('bodyErr').textContent = 'กรอกน้ำหนักและส่วนสูงให้ครบก่อนนะ';
        return;
      }
      data.profile.weight = wv; data.profile.height = hv;
      data.profile.bmi = calcBMI(wv, hv);
      screenState='bmiResult'; render();
    });
  }

  if(s==='bmiResult'){
    document.getElementById('toQuizFromBmi').addEventListener('click', ()=>{
      screenState='quiz'; render();
    });
  }

  if(s==='quiz'){
    document.getElementById('backBtn').addEventListener('click', ()=>{ screenState='body'; render(); });
    screenEl.querySelectorAll('.quiz-opt').forEach(o=> o.addEventListener('click', ()=>{
      data.quiz.answers[parseInt(o.dataset.qi)] = parseInt(o.dataset.oi);
      render();
    }));
    document.getElementById('toQuizResult').addEventListener('click', ()=>{
      if(data.quiz.answers.includes(null)){
        document.getElementById('quizErr').textContent = 'ตอบให้ครบทุกข้อก่อนนะ';
        return;
      }
      let score = 0;
      quizQuestions.forEach((qq,i)=>{ if(data.quiz.answers[i]===qq.correct) score++; });
      data.quiz.score = score;
      data.quiz.submitted = true;
      screenState='quizResult'; render();
      if(score===quizQuestions.length) burstConfetti(30);
    });
  }

  if(s==='quizResult'){
    document.getElementById('toWeeksFirst').addEventListener('click', ()=>{
      data.onboarded = true;
      saveData();
      screenState='weeks'; render();
    });
  }

  if(s==='weeks'){
    screenEl.querySelectorAll('.week-item[data-clickable="1"]').forEach(w=> w.addEventListener('click', ()=>{
      ctx.activeWeek = parseInt(w.dataset.week);
      screenState='weekDetail'; render();
    }));
    const challengeBtn = document.getElementById('toChallengeWheel');
    if(challengeBtn) challengeBtn.addEventListener('click', ()=> openWheel('challenge'));
    const foodBtn = document.getElementById('toFoodWheel');
    if(foodBtn) foodBtn.addEventListener('click', ()=> openWheel('food'));
    document.getElementById('resetBtn').addEventListener('click', async ()=>{
      const keepId = data.playerId;
      data = JSON.parse(JSON.stringify(defaultState));
      data.playerId = keepId;
      await saveData();
      screenState='lang'; render();
    });
    document.getElementById('logoutBtn').addEventListener('click', doLogout);
  }

  if(s==='weekDetail'){
    document.getElementById('backToWeeks').addEventListener('click', ()=>{ screenState='weeks'; render(); });
    screenEl.querySelectorAll('.log-item[data-log-idx]').forEach(li=> li.addEventListener('click', ()=>{
      openEditLog(ctx.activeWeek, parseInt(li.dataset.logIdx));
    }));
    const finished = data.weeks[ctx.activeWeek].done>=7;
    if(finished){
      document.getElementById('backToWeeks2').addEventListener('click', ()=>{ screenState='weeks'; render(); });
    }else{
      const checkinBtn = document.getElementById('toCheckin');
      if(checkinBtn) checkinBtn.addEventListener('click', ()=>{
        if(hasCheckedInToday()){ screenState='weekDetail'; render(); return; } // shouldn't happen, but stay safe
        ctx.meals = freshMeals();
        ctx.mealIndex = 0;
        ctx.exercise = freshExercise();
        screenState='checkin'; render();
      });
    }
  }

  if(s==='checkin'){
    document.getElementById('backToWeekDetail').addEventListener('click', ()=>{ screenState='weekDetail'; render(); });
    document.getElementById('mealYes').addEventListener('click', ()=>{
      ctx.meals[ctx.mealIndex].eaten = true;
      screenState='foodlogSingle'; render();
    });
    document.getElementById('mealNo').addEventListener('click', ()=>{
      ctx.meals[ctx.mealIndex].eaten = false;
      advanceMeal();
    });
  }

  if(s==='foodlogSingle'){
    document.getElementById('backToCheckin').addEventListener('click', ()=>{
      screenState='checkin'; render();
    });
    const inp = document.getElementById('foodInput');
    inp.addEventListener('input', ()=>{ ctx.meals[ctx.mealIndex].food = inp.value; });
    screenEl.querySelectorAll('.food-tag').forEach(t=> t.addEventListener('click', ()=>{
      const tag = t.dataset.tag;
      const tags = ctx.meals[ctx.mealIndex].tags;
      if(tags.includes(tag)){ ctx.meals[ctx.mealIndex].tags = tags.filter(x=>x!==tag); }
      else{ tags.push(tag); }
      render();
    }));
    document.getElementById('mealNext').addEventListener('click', ()=>{
      const food = document.getElementById('foodInput').value.trim();
      const hasTags = ctx.meals[ctx.mealIndex].tags.length > 0;
      if(!food && !hasTags){
        document.getElementById('foodErr').textContent = 'พิมพ์เมนูอาหาร หรือแตะเลือกจากรายการก่อนนะ';
        return;
      }
      if(food && !isValidFoodText(food)){
        document.getElementById('foodErr').textContent = 'ไม่พบเมนูนี้ในรายการที่รู้จักนะ ลองพิมพ์ชื่อเมนูให้ชัดเจน หรือเลือกจากที่แนะนำ (แตะแล้วจะมีตัวเลือกให้เลือก) หรือแตะแท็กด้านล่างแทนก็ได้';
        return;
      }
      ctx.meals[ctx.mealIndex].food = food;
      advanceMeal();
    });
  }

  if(s==='exercise'){
    document.getElementById('backToWeekDetail').addEventListener('click', ()=>{ screenState='weekDetail'; render(); });
    screenEl.querySelectorAll('.yn-btn').forEach(b=> b.addEventListener('click', ()=>{
      ctx.exercise.done = b.dataset.val==='yes';
      render();
    }));
    screenEl.querySelectorAll('[data-etag]').forEach(t=> t.addEventListener('click', ()=>{
      const tag = t.dataset.etag;
      ctx.exercise.type = (ctx.exercise.type===tag) ? '' : tag;
      render();
    }));
    const durInp = document.getElementById('durationInput');
    if(durInp) durInp.addEventListener('input', ()=>{ ctx.exercise.duration = durInp.value; });
    document.getElementById('exerciseNext').addEventListener('click', ()=>{
      if(durInp) ctx.exercise.duration = durInp.value.trim();
      finishDay();
    });
  }

  if(s==='dayDone'){
    document.getElementById('toRewardWheel').addEventListener('click', ()=> openWheel('reward'));
    document.getElementById('backToWeekDetail2').addEventListener('click', ()=>{ screenState='weekDetail'; render(); });
  }

  if(s==='wheel'){
    const backBtn = document.getElementById('wheelBack');
    if(backBtn) backBtn.addEventListener('click', ()=>{ screenState='weeks'; render(); });
    const spinBtn = document.getElementById('spinBtn');
    if(spinBtn) spinBtn.addEventListener('click', spinWheel);
    const doneBtn = document.getElementById('wheelDoneBtn');
    if(doneBtn) doneBtn.addEventListener('click', onWheelDone);
  }

  if(s==='adminLogin'){
    document.getElementById('adminCancelBtn').addEventListener('click', ()=>{
      screenState = data.onboarded ? 'weeks' : 'lang'; render();
    });
    document.getElementById('adminLoginBtn').addEventListener('click', ()=>{
      const val = document.getElementById('adminPass').value;
      if(val === ADMIN_PASSWORD){
        loadAdminData();
      }else{
        document.getElementById('adminErr').textContent = 'รหัสผ่านไม่ถูกต้อง';
      }
    });
  }

  if(s==='adminDashboard'){
    document.getElementById('adminLogout').addEventListener('click', ()=>{
      screenState = data.onboarded ? 'weeks' : 'lang'; render();
    });
    document.getElementById('adminRefresh').addEventListener('click', loadAdminData);
    const exportBtn = document.getElementById('adminExport');
    if(exportBtn) exportBtn.addEventListener('click', exportAdminExcel);
    const openSheetsBtn = document.getElementById('adminOpenSheets');
    if(openSheetsBtn) openSheetsBtn.addEventListener('click', ()=>{
      window.open(GOOGLE_SHEETS_VIEW_URL, '_blank', 'noopener');
    });
    const syncAllBtn = document.getElementById('adminSyncAll');
    if(syncAllBtn) syncAllBtn.addEventListener('click', syncAllToGoogleSheets);
  }

  if(s==='editLog'){
    document.getElementById('editCancel').addEventListener('click', ()=>{ screenState='weekDetail'; render(); });
    document.getElementById('editCancel2').addEventListener('click', ()=>{ screenState='weekDetail'; render(); });

    screenEl.querySelectorAll('.yn-btn[data-meal-idx]').forEach(b=> b.addEventListener('click', ()=>{
      const mi = parseInt(b.dataset.mealIdx);
      ctx.editDraft.meals[mi].eaten = b.dataset.val==='yes';
      render();
    }));
    screenEl.querySelectorAll('.editFoodInput').forEach(inp=> inp.addEventListener('input', ()=>{
      const mi = parseInt(inp.dataset.mealIdx);
      ctx.editDraft.meals[mi].food = inp.value;
    }));
    screenEl.querySelectorAll('.food-tag[data-meal-idx]').forEach(t=> t.addEventListener('click', ()=>{
      const mi = parseInt(t.dataset.mealIdx);
      const tag = t.dataset.tag;
      const tags = ctx.editDraft.meals[mi].tags;
      ctx.editDraft.meals[mi].tags = tags.includes(tag) ? tags.filter(x=>x!==tag) : [...tags, tag];
      render();
    }));

    document.getElementById('editExYes').addEventListener('click', ()=>{ ctx.editDraft.exercise.done = true; render(); });
    document.getElementById('editExNo').addEventListener('click', ()=>{ ctx.editDraft.exercise.done = false; render(); });
    screenEl.querySelectorAll('[data-etag]').forEach(t=> t.addEventListener('click', ()=>{
      const tag = t.dataset.etag;
      ctx.editDraft.exercise.type = (ctx.editDraft.exercise.type===tag) ? '' : tag;
      render();
    }));
    const editDurInp = document.getElementById('editDurationInput');
    if(editDurInp) editDurInp.addEventListener('input', ()=>{ ctx.editDraft.exercise.duration = editDurInp.value; });

    document.getElementById('editSaveBtn').addEventListener('click', ()=>{
      const d = ctx.editDraft;
      const incomplete = d.meals.some(m=> m.eaten===null) || d.exercise.done===null;
      if(incomplete){
        document.getElementById('editErr').textContent = 'กรุณาตอบให้ครบทุกมื้อและออกกำลังกายก่อนบันทึก';
        return;
      }
      const missingFood = d.meals.some(m=> m.eaten===true && !m.food.trim() && m.tags.length===0);
      if(missingFood){
        document.getElementById('editErr').textContent = 'กรุณาพิมพ์เมนูอาหาร หรือเลือกจากรายการให้ครบทุกมื้อที่ทานก่อนบันทึก';
        return;
      }
      const invalidFood = d.meals.some(m=> m.eaten===true && m.food.trim() && !isValidFoodText(m.food));
      if(invalidFood){
        document.getElementById('editErr').textContent = 'ไม่พบเมนูนี้ในรายการที่รู้จักนะ ลองพิมพ์ชื่อเมนูให้ชัดเจน หรือเลือกจากที่แนะนำ (แตะแล้วจะมีตัวเลือกให้เลือก) หรือแตะแท็กด้านล่างแทนก็ได้';
        return;
      }
      if(editDurInp) d.exercise.duration = editDurInp.value.trim();
      const wk = data.weeks[ctx.editWeek];
      wk.logs[ctx.editLogIndex] = {
        day: d.day,
        meals: d.meals.map((m,mi)=>({ name: mealNames[mi], eaten:m.eaten, food:m.food, tags:m.tags.slice() })),
        exercise: { done:d.exercise.done, type:d.exercise.type, duration:d.exercise.duration },
        reward: d.reward,
      };
      saveData();
      screenState='weekDetail';
      render();
    });
  }
}

function openEditLog(weekIndex, logIndex){
  const log = data.weeks[weekIndex].logs[logIndex];
  const meals = Array.isArray(log.meals)
    ? log.meals.map(m=>({ eaten: m.eaten ?? null, food: m.food || '', tags: (m.tags||[]).slice() }))
    : mealNames.map(()=>({ eaten: log.eaten ?? null, food: log.food || '', tags: (log.tags||[]).slice() }));
  ctx.editWeek = weekIndex;
  ctx.editLogIndex = logIndex;
  ctx.editDraft = {
    day: log.day,
    meals,
    exercise: {
      done: log.exercise ? (log.exercise.done ?? null) : null,
      type: log.exercise ? (log.exercise.type || '') : '',
      duration: log.exercise ? (log.exercise.duration || '') : '',
    },
    reward: log.reward || null,
  };
  screenState = 'editLog';
  render();
}

// ============ WHEEL LOGIC ============
function openWheel(mode){
  const segments = mode==='reward' ? wheelRewardSegments : (mode==='food' ? wheelFoodSegments : wheelChallengeSegments);
  ctx.wheel = { mode, segments, spinning:false, resultIndex:null, rotation:0, spun:false };
  screenState = 'wheel';
  render();
}

function spinWheel(){
  if(!ctx.wheel || ctx.wheel.spinning) return;
  const segs = ctx.wheel.segments;
  const n = segs.length;
  const sliceDeg = 360/n;
  const targetIndex = Math.floor(Math.random()*n);
  const mid = targetIndex*sliceDeg + sliceDeg/2;
  const jitter = (Math.random()-0.5)*sliceDeg*0.5;
  const finalRotation = 360*5 - (mid + jitter);

  ctx.wheel.spinning = true;
  render();

  const discEl = document.getElementById('wheelDisc');
  if(discEl){
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        discEl.style.transition = 'transform 3.2s cubic-bezier(.17,.67,.32,1)';
        discEl.style.transform = `rotate(${finalRotation}deg)`;
      });
    });
  }

  setTimeout(()=>{
    ctx.wheel.spinning = false;
    ctx.wheel.resultIndex = targetIndex;
    ctx.wheel.rotation = finalRotation;
    ctx.wheel.spun = true;
    render();
    burstConfetti(24);
  }, 3300);
}

function onWheelDone(){
  const w = ctx.wheel;
  if(!w || w.resultIndex==null) return;
  const label = w.segments[w.resultIndex].label;
  if(w.mode==='reward'){
    const wk = data.weeks[ctx.activeWeek];
    if(wk.logs.length){ wk.logs[wk.logs.length-1].reward = label; }
    saveData();
    screenState = 'weekDetail';
  }else if(w.mode==='food'){
    data.dailyFood = { date: todayStr(), text: label };
    saveData();
    screenState = 'weeks';
  }else{
    data.dailyChallenge = { date: todayStr(), text: label };
    saveData();
    screenState = 'weeks';
  }
  render();
}

function advanceMeal(){
  ctx.mealIndex++;
  if(ctx.mealIndex >= mealNames.length){
    screenState='exercise'; render();
  }else{
    screenState='checkin'; render();
  }
}

function finishDay(){
  if(hasCheckedInToday()){
    // Already checked in today (e.g. two tabs open) — don't double-count,
    // just show the completion screen.
    screenState='dayDone'; render();
    return;
  }
  const w = data.weeks[ctx.activeWeek];
  if(w.done<7){
    w.done++;
    w.logs.push({
      day: w.done,
      meals: ctx.meals.map((m,mi)=>({ name: mealNames[mi], eaten: m.eaten, food: m.food, tags: m.tags.slice() })),
      exercise: { done: ctx.exercise.done, type: ctx.exercise.type, duration: ctx.exercise.duration }
    });
  }
  updateStreak();
  saveData();
  screenState='dayDone';
  render();
  burstConfetti();
}

document.getElementById('adminEntry').addEventListener('click', ()=>{
  screenState = 'adminLogin';
  render();
});
// Initial screen is driven by auth.onAuthStateChanged(...) above —
// it fires once automatically as soon as Firebase checks the login state.
</script>
